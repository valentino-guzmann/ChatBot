spring.application.name=ChatBot MVT

spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQL_DATABASE}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== LOGGING =====
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR
logging.level.org.hibernate.orm.results.loading.plan=ERROR
# Mantiene tus logs de negocio en nivel INFO
logging.level.com.chatbotmvt=INFO

access.token=${ACCESS_TOKEN}
whatsapp.phone-id=${PHONE_NUMBER_ID}
facebook.app-secret=${FACEBOOK_SECRET}

# ===== CLOUDINARY =====
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# ===== UPLOADS (fallback local, deprecado) =====
app.upload.dir=${UPLOAD_DIR:uploads}
app.base-url=${APP_BASE_URL:}

# ===== TIMEZONE GLOBAL =====
spring.jackson.time-zone=America/Argentina/Buenos_Aires
spring.jpa.properties.hibernate.jdbc.time_zone=America/Argentina/Buenos_Aires