spring.application.name=ChatBot MVT

spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQL_DATABASE}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== LOGGING =====
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR
logging.level.org.hibernate.orm.results.loading.plan=ERROR
# Mantiene tus logs de negocio en nivel INFO
logging.level.com.chatbotmvt=INFO

access.token=${ACCESS_TOKEN}
whatsapp.phone-id=${PHONE_NUMBER_ID}
facebook.app-secret=${FACEBOOK_SECRET}

# ===== TIMEZONE GLOBAL =====
spring.jackson.time-zone=UTC
spring.jpa.properties.hibernate.jdbc.time_zone=UTC